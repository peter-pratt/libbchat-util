# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Libbchat Utils API Functions
repo_url: https://github.com/bchat-foundation/libbchat-util
copyright: Copyright &copy; 2025 - BChat Technology Foundation (BChat Technology Stiftung)
extra:
  social:
    - icon: fontawesome/brands/github 
      link: https://github.com/bchat-foundation/libbchat-util
extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css
extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tilde
plugins:
  - privacy
  - search
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom 
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Content
    - content.code.copy
    # Navigation
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - navigation.tracking
    # Search
    - search.highlight
    - search.share
    - search.suggest
    # Table of Contents
    - toc.follow
